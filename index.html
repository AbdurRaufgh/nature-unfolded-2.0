<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature-Unfolded | Sustainable Food Storage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="hero-container">
        <header class="brand-header">
            <span class="logo-text">Nature-Unfolded</span>
        </header>

        <section class="hero-content">
            <h1 class="main-heading">Ditch plastic wrap.<br>Keep food fresh naturally.</h1>
            <p class="subheading">We are crafting premium, reusable beeswax wraps designed to eliminate single-use plastic from your kitchen. Join the waitlist for exclusive launch updates and early-bird discounts.</p>

            <!-- 
              Replace 'your-email@gmail.com' with your actual email address. 
              Formsubmit will securely send signups straight to your inbox.
            -->
            <form action="https://formsubmit.co/justarauf@gmail.com" method="POST" class="waitlist-form">
                <!-- Redirects users to a clean thank-you page after they submit -->
                <input type="hidden" name="_next" value="https://formsubmit.co/thanks">
                <!-- Prevents spam bots -->
                <input type="hidden" name="_captcha" value="false">
                
                <div class="input-group">
                    <input type="email" name="email" placeholder="Enter your email address" required class="email-input">
                    <button type="submit" class="submit-btn">Join Waitlist</button>
                </div>
            </form>
        </section>
    </main>

</body>
</html>
